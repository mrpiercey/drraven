<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>DR. RAVEN — The Time-Traveling Bookworm</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0a0612;
    overflow: hidden;
    font-family: monospace;
  }
  #wrap {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #0a0612;
    box-shadow: 0 0 80px rgba(120, 60, 200, .35);
  }
  #hint {
    position: fixed; bottom: 8px; left: 0; right: 0;
    text-align: center; color: #6b5a8c; font-size: 11px;
    letter-spacing: 1px; user-select: none;
  }
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="512" height="288"></canvas></div>
<div id="hint">ARROWS move &nbsp;·&nbsp; SPACE jump &nbsp;·&nbsp; ENTER throw books / open doors &nbsp;·&nbsp; TAB inventory &nbsp;·&nbsp; M mute</div>
<script src="books.js"></script>
<script src="game.js"></script>
</body>
</html>
